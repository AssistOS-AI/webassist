<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spec Loader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292e; background: #fff; padding: 2rem; max-width: 900px; margin: 0 auto; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-bottom: 1rem; }
    h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 1.5rem; margin-bottom: 1rem; }
    h3 { margin-top: 1.5rem; margin-bottom: 1rem; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 85%; }
    pre { background: #f6f8fa; padding: 16px; overflow: auto; border-radius: 6px; margin-bottom: 1rem; }
    pre code { background: none; padding: 0; font-size: 85%; }
    blockquote { border-left: 4px solid #dfe2e5; padding-left: 1em; color: #6a737d; margin-bottom: 1rem; }
    ul, ol { padding-left: 2em; margin-bottom: 1rem; }
    li { margin-bottom: 0.25em; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
    th, td { border: 1px solid #dfe2e5; padding: 6px 13px; }
    th { background: #f6f8fa; font-weight: 600; }
    strong { font-weight: 600; }
    .error { color: #d73a49; background: #ffeef0; padding: 1rem; border-radius: 6px; border: 1px solid #fdaeb7; }
    .back-link { display: block; margin-bottom: 1.5rem; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back to Docs</a>
  <div id="content"></div>
  <script>
    (async () => {
      const contentEl = document.getElementById('content');
      const params = new URLSearchParams(window.location.search);
      let spec = params.get('spec') || 'matrix.md';

      try {
        const res = await fetch(`specs/${spec}`);
        if (!res.ok) throw new Error(`HTTP ${res.status} - ${res.statusText}`);
        const md = await res.text();
        contentEl.innerHTML = marked.parse(md);
        const h1 = contentEl.querySelector('h1');
        if (h1) {
          document.title = h1.textContent + '  Spec';
        }
      } catch (err) {
        contentEl.innerHTML = `<div class="error"><strong>Error loading spec:</strong> ${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
