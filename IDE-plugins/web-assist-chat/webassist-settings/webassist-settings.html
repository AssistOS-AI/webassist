<div class="webassist-settings-modal">
    <div class="modal-header">
        <div class="modal-title">WebAssist Chat Settings</div>
        <div class="close" data-local-action="closeModal" aria-label="Close">
            <img class="close-icon" src="./assets/icons/x-mark.svg" alt="close">
        </div>
    </div>

    <div class="modal-body webassist-settings-body">
        <p class="webassist-settings-description">
            Configure a bundled iframe chat, preview it, and copy the embed code.
        </p>

        <div class="webassist-settings-grid">
            <label class="form-item">
                <span class="form-label">Theme</span>
                <select id="webassistTheme" class="form-input">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="aqua">Aqua</option>
                    <option value="forest">Forest</option>
                    <option value="amethyst">Amethyst</option>
                </select>
            </label>

            <label class="form-item">
                <span class="form-label">Header Text</span>
                <input id="webassistHeaderText" class="form-input" type="text" maxlength="100" placeholder="WebAssist Assistant" spellcheck="false">
            </label>

            <label class="form-item">
                <span class="form-label">Subheader Text</span>
                <input id="webassistSubtitleText" class="form-input" type="text" maxlength="120" placeholder="Embedded preview" spellcheck="false">
            </label>

            <label class="form-item color-item">
                <span class="form-label">Chat Background</span>
                <input id="webassistChatBackground" class="form-input" type="color">
            </label>

            <label class="form-item color-item">
                <span class="form-label">User Bubble</span>
                <input id="webassistUserBubble" class="form-input" type="color">
            </label>

            <label class="form-item color-item">
                <span class="form-label">Agent Bubble</span>
                <input id="webassistAgentBubble" class="form-input" type="color">
            </label>

            <label class="form-item color-item">
                <span class="form-label">Header Color</span>
                <input id="webassistHeaderColor" class="form-input" type="color">
            </label>
        </div>

        <div class="webassist-settings-actions">
            <button type="button" class="general-button" data-local-action="openAdminWebchat">Admin Webchat</button>
            <button type="button" id="webassistPreviewButton" class="general-button" data-local-action="openPreviewChat">Preview Chat</button>
            <button type="button" id="webassistCopyButton" class="general-button" data-local-action="copyIframeCode">Copy iframe code</button>
        </div>

        <label class="form-item webassist-snippet-wrap">
            <span class="form-label">Generated iframe snippet</span>
            <textarea id="webassistIframeSnippet" class="form-input" rows="6"></textarea>
        </label>

        <div id="webassistSettingsStatus" class="webassist-settings-status" role="status" aria-live="polite"></div>
    </div>
</div>
