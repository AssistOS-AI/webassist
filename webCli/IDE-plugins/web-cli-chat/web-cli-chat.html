<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WebCli Embedded Chat</title>
    <link rel="stylesheet" href="./web-cli-chat.css">
</head>
<body>
    <div class="chat-shell">
        <header class="chat-header">
            <div>
                <div class="chat-title" id="chatTitle">WebCli Assistant</div>
                <div class="chat-subtitle" id="chatSubtitle">Context-aware website chat</div>
            </div>
        </header>
        <div class="chat-body">
            <div class="chat-messages" id="chatMessages" aria-live="polite">
                <div class="chat-message agent chat-typing" id="typing" aria-hidden="true">
                    <div class="chat-bubble">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
            <form class="chat-composer" id="chatComposer" autocomplete="off">
                <textarea id="chatInput" class="chat-input" rows="1" placeholder="Ask WebCli about the website..."></textarea>
                <button id="chatSend" class="chat-send" type="submit">Send</button>
            </form>
        </div>
    </div>

    <script type="module" src="./web-cli-chat.js"></script>
</body>
</html>
